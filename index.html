<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Chess</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
<h1>Super Chess</h1>
<div id="status"></div>
<div id="board"></div>
<div id="captured">
<div class="captured-pieces"><h3>Captured by White</h3><div id="captured-white"></div></div>
<div class="captured-pieces"><h3>Captured by Black</h3><div id="captured-black"></div></div>
</div>
<div id="cards-panel">
<div class="player-cards" id="player-cards-w">
<h2>White <span class="points-display" id="points-w">0</span> pts</h2>
<div class="card-slots" id="card-slots-w"></div>
</div>
<div class="player-cards" id="player-cards-b">
<h2>Black <span class="points-display" id="points-b">0</span> pts</h2>
<div class="card-slots" id="card-slots-b"></div>
</div>
</div>
<button id="reset-btn">New Game</button>
</div>

<div id="promotion-modal" class="hidden">
<div id="promotion-choices"></div>
</div>

<div id="deck-builder" class="hidden">
<div class="deck-builder-inner">
<h2>Build Your Deck</h2>
<p class="deck-subtitle">Pick 5 cards — one per piece type. Must include at least 1 Movement, 1 Attack, and 1 Defense & Utility card.</p>
<div id="deck-players">
<div class="deck-player" id="deck-p1">
<h3>White</h3>
<div class="deck-picks" id="deck-picks-w"></div>
<div class="deck-errors" id="deck-errors-w"></div>
</div>
<div class="deck-player" id="deck-p2">
<h3>Black</h3>
<div class="deck-picks" id="deck-picks-b"></div>
<div class="deck-errors" id="deck-errors-b"></div>
</div>
</div>
<div id="deck-pool">
<div class="pool-tabs">
<button class="pool-tab active" data-path="all">All</button>
<button class="pool-tab" data-path="movement">Movement</button>
<button class="pool-tab" data-path="attack">Attack</button>
<button class="pool-tab" data-path="defense">Defense</button>
</div>
<div class="pool-cards" id="pool-cards"></div>
</div>
<button id="start-game-btn" class="start-btn">Start Game</button>
</div>
</div>

<script src="cards-data.js"></script>
<script src="card-system.js"></script>
<script src="script.js"></script>
</body>
</html>
